name: Update Lotto Data

on:
  schedule:
    # Run every Saturday at 21:35 KST (Saturday 12:13 UTC)
    # Lotto draw is at Saturday 20:35 KST, so this runs about 38 mins later.
    - cron: '35 12 * * 6'
  workflow_dispatch:

# Grant write permission to the GITHUB_TOKEN so it can push changes
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install dependencies from requirements.txt (includes selenium, webdriver_manager)
        pip install -r requirements.txt

    - name: Read previous latest round
      id: before-latest
      run: |
        if [ -f lotto_data/latest.lotto ]; then
          echo "round=$(cat lotto_data/latest.lotto | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
        else
          echo "round=0" >> "$GITHUB_OUTPUT"
        fi
        
    - name: Run crawler
      run: python crawler.py

    - name: Check latest round update
      id: after-latest
      run: |
        if [ -f lotto_data/latest.lotto ]; then
          LATEST_ROUND=$(cat lotto_data/latest.lotto | tr -d '[:space:]')
        else
          LATEST_ROUND=0
        fi

        echo "round=$LATEST_ROUND" >> "$GITHUB_OUTPUT"
        if [ "$LATEST_ROUND" != "${{ steps.before-latest.outputs.round }}" ]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "latest.lotto changed: ${{ steps.before-latest.outputs.round }} -> $LATEST_ROUND"
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
          echo "latest.lotto unchanged: $LATEST_ROUND"
        fi

    - name: Generate owner prediction numbers
      if: steps.after-latest.outputs.changed == 'true'
      run: python -B StarNumber.py 5 --engine future --start-round 1
      
    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add lotto_data/
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update lotto data, stats, and star numbers"
          git push
        fi
